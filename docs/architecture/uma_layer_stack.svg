<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1000">
  <style>
    .bg { fill: #061727; }
    .layer-box { fill: none; stroke: #5fb3ff; stroke-width: 2; }
    .text { fill: #e6f3ff; font-family: "Segoe UI", sans-serif; font-size: 24px; }
    .title { fill: #e6f3ff; font-family: "Segoe UI", sans-serif; font-size: 32px; font-weight: bold; }
    .subtitle { fill: #9fd0ff; font-family: "Segoe UI", sans-serif; font-size: 20px; }
  </style>

  <!-- Background -->
  <rect class="bg" x="0" y="0" width="1400" height="1000" />

  <!-- Title -->
  <text class="title" x="60" y="90">
    UMA‑Universal — Layer Stack Blueprint
  </text>
  <text class="subtitle" x="60" y="130">
    Thoroughfare (movement), Cosmology Engine (runtime), Meta Behavior (behavior)
  </text>

  <!-- Thoroughfare Layer -->
  <rect class="layer-box" x="80" y="180" width="1240" height="200" />
  <text class="text" x="100" y="220">Thoroughfare — Movement Layer</text>

  <text class="text" x="160" y="270">Corridors</text>
  <text class="text" x="640" y="270">Braid</text>
  <text class="text" x="1080" y="270">Weave</text>

  <text class="text" x="140" y="310" font-size="18">
    Linear precedence • Stable paths • Deterministic movement
  </text>
  <text class="text" x="620" y="310" font-size="18">
    Interwoven support • Multi‑perspective movement • Non‑recursive
  </text>
  <text class="text" x="1040" y="310" font-size="18">
    Distributed mesh • Multi‑node flow • Conceptual expansion
  </text>

  <!-- Cosmology Engine Layer -->
  <rect class="layer-box" x="80" y="430" width="1240" height="200" />
  <text class="text" x="100" y="470">Cosmology Engine — Runtime Layer</text>

  <text class="text" x="160" y="520">State</text>
  <text class="text" x="640" y="520">Flow</text>
  <text class="text" x="1080" y="520">Transition</text>

  <text class="text" x="140" y="560" font-size="18">
    Runtime conditions • Non‑origin state • Stable context
  </text>
  <text class="text" x="620" y="560" font-size="18">
    Non‑pursuit flow • Movement through states • Continuous runtime
  </text>
  <text class="text" x="1040" y="560" font-size="18">
    Non‑hierarchical transitions • Reconfiguration • Phase shifts
  </text>

  <!-- Meta Behavior Layer -->
  <rect class="layer-box" x="80" y="680" width="1240" height="200" />
  <text class="text" x="100" y="720">Meta Behavior — Behavioral Layer</text>

  <text class="text" x="160" y="770">Emergence</text>
  <text class="text" x="640" y="770">Structure</text>
  <text class="text" x="1080" y="770">Absurdity</text>

  <text class="text" x="140" y="810" font-size="18">
    New behavior from interactions • Pattern surfacing
  </text>
  <text class="text" x="620" y="810" font-size="18">
    Evolving forms • Runtime‑informed organization
  </text>
  <text class="text" x="1040" y="810" font-size="18">
    Revealed metaphors • Non‑literal insight • Edge‑case meaning
  </text>
</svg>
