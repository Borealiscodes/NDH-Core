<svg width="720" height="720" viewBox="0 0 720 720" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="100%" height="100%" fill="#fdfdfd"/>

  <!-- Center Stillness (Point) -->
  <circle cx="360" cy="360" r="8" fill="#333" />
  <text x="370" y="360" font-size="16" fill="#333">Center Stillness</text>

  <!-- Upward Clarity (Ray) -->
  <line x1="360" y1="360" x2="360" y2="120" stroke="#4a90e2" stroke-width="6" stroke-linecap="round"/>
  <text x="370" y="130" font-size="16" fill="#4a90e2">Upward Clarity</text>

  <!-- Downward Grounding (Curve) -->
  <path d="M360 360 Q 360 500 360 600" stroke="#7b8c8c" stroke-width="6" fill="none" stroke-linecap="round"/>
  <text x="370" y="590" font-size="16" fill="#7b8c8c">Downward Grounding</text>

  <!-- Outward Expansion (Outward Spiral) -->
  <path d="M360 360
           m -20 0
           a 20 20 0 1 1 40 0
           a 40 40 0 1 1 -80 0
           a 60 60 0 1 1 120 0"
        stroke="#e67e22" stroke-width="4" fill="none"/>
  <text x="500" y="360" font-size="16" fill="#e67e22">Outward Expansion</text>

  <!-- Inward Reflection (Inward Spiral) -->
  <path d="M360 360
           m 60 0
           a 60 60 0 1 0 -120 0
           a 40 40 0 1 0 80 0
           a 20 20 0 1 0 -40 0"
        stroke="#9b59b6" stroke-width="4" fill="none"/>
  <text x="180" y="360" font-size="16" fill="#9b59b6">Inward Reflection</text>

  <!-- Lateral Drift (Wave) -->
  <path d="M140 360
           q 50 -40 100 0
           t 100 0
           t 100 0
           t 100 0"
        stroke="#2ecc71" stroke-width="6" fill="none" stroke-linecap="round"/>
  <text x="140" y="330" font-size="16" fill="#2ecc71">Lateral Drift</text>

</svg>
